name = "level-up-lesson"
main = "leveluplesson_worker.js"
compatibility_date = "2025-06-01"

# ── 상담 신청 메일 알림 (Cloudflare Email Routing) ──
# 먼저 대시보드에서 Email Routing을 켜고, 받을 메일 주소를
# Destination Address로 등록·인증해야 합니다.
# 받는 주소는 워커 설정의 환경변수 NOTIFY_TO 에 넣습니다.
[[send_email]]
name = "NOTIFY"

# ── 커스텀 도메인 연결 (도메인이 Cloudflare에 등록되어 있어야 함) ──
# routes = [
#   { pattern = "level-up-lesson.com/*", zone_name = "level-up-lesson.com" }
# ]

# ── 상담 신청을 KV에 저장하려면 주석 해제 후 id 입력 ──
# (먼저 실행:  wrangler kv namespace create INQUIRIES  → 출력된 id 사용)
# [[kv_namespaces]]
# binding = "INQUIRIES"
# id = "여기에_네임스페이스_id"
